learned: true

default:
  model:
    name: CrossModalVAE
    latent_dim: 64
    hidden_dims: [512, 256]
    use_pca_encoder: false
    n_pca_components_encoder: 256
    use_pca_decoder: false
    n_pca_components_decoder: 256
    dropout: 0.1
    l1_l2_tuple: [0.0, 0.0]
    device: null
  trainer:
    lr: 1.0e-4
    loss_type: vae
    loss_alpha: 0.5
    loss_beta: 1.0
    max_epochs: 100
    batch_size: 128
    log_every: 5

search_space:
  latent_dim:
    type: choice
    values: [16, 32, 64, 128]
  hidden_dims:
    type: choice
    values:
      - [1024, 512]
      - [512, 256]
      - [256, 128]
  use_pca_encoder:
    type: choice
    values: [true, false]
  n_pca_components_encoder:
    type: choice
    values: [64, 128, 256, 512]
  use_pca_decoder:
    type: choice
    values: [true, false]
  n_pca_components_decoder:
    type: choice
    values: [64, 128, 256, 512]
  dropout:
    type: uniform
    lower: 0.0
    upper: 0.4
  l1_l2_tuple:
    type: quniform
    lower: [0.0, 0.0]
    upper: [0.001, 0.001]
    q: [0.0001, 0.0001]
  lr:
    type: loguniform
    lower: 1.0e-5
    upper: 1.0e-2
  loss_beta:
    type: uniform
    lower: 0.1
    upper: 2.0
  max_epochs:
    type: choice
    values: [50, 100, 150, 200, 250]
