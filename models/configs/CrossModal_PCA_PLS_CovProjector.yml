learned: true

default:
  data:
    source: SC
    target: FC
  model:
    name: CrossModal_PCA_PLS_CovProjector
    n_components_pca_source: 256
    n_components_pca_target: 256
    n_components_pls: 32
    learn_encoder: false
    learn_mid: false
    learn_decoder: false
    random_init: false
    l1_l2_tuple: [0.0, 0.0001]
    dropout: 0.1
    cov_sources: [fs_all, fs_volumes, age, sex, race_eth]
    cov_projectors:
      fs_all:     {type: linear, out_dim: 64}
      fs_volumes: {type: linear, out_dim: 16}
      age:        {type: linear, out_dim: 4}
      sex:        {type: linear, out_dim: 4}
      race_eth:   {type: linear, out_dim: 8}
    cov_fusion:
      type: mlp
      hidden_dims: [64]
      dropout: 0.1
      layer_norm: true
    use_target_scores_in_projector: false  # sanity-check: feed true FC latent scores into projector (induces target leakage)
    device: null
  trainer:
    lr: 1.0e-4
    loss_type: mse
    max_epochs: 200
    batch_size: 64
    log_every: 5

search_space:
  n_components_pca_source:
    type: choice
    values:
      [64, 128, 256, 512]
  n_components_pca_target:
    type: choice
    values: [64, 128, 256, 512]
  n_components_pls:
    type: choice
    values: [4, 8, 16, 32, 64]
  cov_fusion:
    type: choice
    values:
      - {type: linear}
      - {type: mlp, hidden_dims: [64],  dropout: 0.1, layer_norm: false}
      - {type: mlp, hidden_dims: [64],  dropout: 0.1, layer_norm: true}
      - {type: mlp, hidden_dims: [64, 32],  dropout: 0.1, layer_norm: true}
      - {type: mlp, hidden_dims: [128], dropout: 0.2, layer_norm: true}
  dropout:
    type: uniform
    lower: 0.0
    upper: 0.4
  l1_reg:
    type: choice
    values: [0.0, 1.0e-7, 1.0e-6, 1.0e-5, 1.0e-4]
  l2_reg:
    type: loguniform
    lower: 1.0e-6
    upper: 1.0e-2
  lr:
    type: loguniform
    lower: 1.0e-5
    upper: 1.0e-2
  loss_type:
    type: choice
    values: [mse, latent_mse, latent_weighted_mse]
  max_epochs:
    type: choice
    values: [50, 100, 150, 200, 250]
