learned: true

default:
  data:
    source: SC
    target: FC
  model:
    name: NodalMLP
    hidden_dim: 96
    decoder_dim: 64
    dropout: 0.2
    reg: 1.0e-4
    use_encoder: true
    decoder_symmetry: symmetric
    sc_row_norm: none
    use_volume: false
    use_spatial: true
    use_r2t: false
    use_sc_row: false
    device: null
  trainer:
    lr: 2.0e-3
    loss_type: mse
    max_epochs: 750
    batch_size: 32
    log_every: 1

search_space:
  use_encoder:
    type: choice
    values: [true, false]
  hidden_dim:
    type: choice
    values: [48, 96, 160, 256]
  decoder_dim:
    type: choice
    values: [32, 64, 96, 128]
  dropout:
    type: choice
    values: [0.05, 0.1, 0.2, 0.35, 0.5]
  reg:
    type: loguniform
    lower: 5.0e-7
    upper: 5.0e-3
  decoder_symmetry:
    type: choice
    values: [symmetric, asymmetric, concat]
  lr:
    type: loguniform
    lower: 1.0e-4
    upper: 1.0e-2
  max_epochs:
    type: choice
    values: [200, 400, 500, 750, 1000]
  batch_size:
    type: choice
    values: [8, 16, 32, 64]
