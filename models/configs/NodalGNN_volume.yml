learned: true

default:
  data:
    source: SC
    target: FC
  model:
    name: NodalGNN
    layer_num: 3
    hidden_dim: 96
    decoder_dim: 64
    dropout: 0.35
    edge_dropout: 0.10
    reg: 1.0e-4
    use_volume: true
    use_spatial: false
    use_r2t: false
    add_self_loops: true
    device: null
  trainer:
    lr: 8.0e-4
    loss_type: mse
    max_epochs: 300
    batch_size: 16
    log_every: 10

search_space:
  layer_num:
    type: choice
    values: [2, 3, 4]
  hidden_dim:
    type: choice
    values: [64, 96, 128]
  decoder_dim:
    type: choice
    values: [32, 64, 128]
  dropout:
    type: choice
    values: [0.2, 0.35, 0.5]
  edge_dropout:
    type: choice
    values: [0.0, 0.1, 0.2]
  reg:
    type: loguniform
    lower: 1.0e-6
    upper: 1.0e-3
  lr:
    type: loguniform
    lower: 2.0e-4
    upper: 2.0e-3
  max_epochs:
    type: choice
    values: [100, 200, 300]
