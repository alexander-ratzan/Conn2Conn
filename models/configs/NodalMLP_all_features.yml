learned: true

default:
  data:
    source: SC
    target: FC
  model:
    name: NodalMLP
    hidden_dim: 256
    decoder_dims: [512, 256, 128]
    dropout: 0.1
    reg: 1.0e-5
    use_encoder: false
    decoder_symmetry: asymmetric
    sc_row_norm: none
    use_volume: true
    use_spatial: true
    use_r2t: true
    use_sc_row: true
    use_sc_pca: true
    sc_pca_dim: 64
    device: null
  trainer:
    lr: 2.0e-3
    loss_type: mse
    max_epochs: 500
    batch_size: 32
    log_every: 2
    lr_schedule: cosine_warm_restarts
    cosine_t0: 50
    cosine_t_mult: 2
    cosine_eta_min_ratio: 0.01

search_space:
  use_encoder:
    type: choice
    values: [false, true]
  hidden_dim:
    type: choice
    values: [96, 128, 256]
  decoder_dims:
    type: choice
    values:
      - [256, 128]
      - [256, 128, 64]
      - [512, 256, 128]
  dropout:
    type: choice
    values: [0.05, 0.1, 0.2, 0.35]
  reg:
    type: loguniform
    lower: 1.0e-6
    upper: 1.0e-4
  sc_row_norm:
    type: choice
    values: [none, brain_scale]
  decoder_symmetry:
    type: choice
    values: [asymmetric, concat, symmetric]
  sc_pca_dim:
    type: choice
    values: [16, 32, 64, 128]
  lr:
    type: loguniform
    lower: 1.0e-3
    upper: 4.0e-3
  max_epochs:
    type: choice
    values: [400, 600, 750]
  batch_size:
    type: choice
    values: [16, 32, 64]
  cosine_t0:
    type: choice
    values: [25, 50, 100]
  cosine_t_mult:
    type: choice
    values: [1, 2]
  cosine_eta_min_ratio:
    type: choice
    values: [0.01, 0.1]
