learned: true

default:
  data:
    source: SC
    target: FC
  model:
    name: CrossModal_PCA_PLS_FSResidual
    n_components_pca_source: 256
    n_components_pca_target: 256
    n_components_pls: 16
    learn_encoder: false
    learn_mid: true
    learn_decoder: false
    random_init: false
    l1_l2_tuple: [0.0, 0.0001]
    dropout: 0.2
    learn_means: false
    fs_projector_type: linear
    fs_hidden_dims: [128]
    fs_dropout: 0.0
    fs_residual_scale_init: 1.0
    learn_fs_scale: false
    device: null
  trainer:
    lr: 1.0e-4
    loss_type: demeaned_mse
    loss_alpha: 0.5
    loss_beta: 1.0
    max_epochs: 150
    batch_size: 128
    log_every: 5

search_space:
  n_components_pca_source:
    type: choice
    values:
      - 64
      - 128
      - 256
      - {SC: 128, SC_r2t: 64}
      - {SC: 256, SC_r2t: 128}
  n_components_pca_target:
    type: choice
    values: [64, 128, 256, 512]
  n_components_pls:
    type: choice
    values: [4, 8, 16, 32, 64]
  fs_projector_type:
    type: choice
    values: [linear, mlp]
  fs_hidden_dims:
    type: choice
    values:
      - [64]
      - [128]
      - [256, 128]
  fs_dropout:
    type: uniform
    lower: 0.0
    upper: 0.3
  dropout:
    type: uniform
    lower: 0.0
    upper: 0.4
  learn_fs_scale:
    type: choice
    values: [false, true]
  lr:
    type: loguniform
    lower: 1.0e-5
    upper: 1.0e-2
  loss_type:
    type: choice
    values: [mse, demeaned_mse, weighted_mse]
  max_epochs:
    type: choice
    values: [50, 100, 150, 200]
