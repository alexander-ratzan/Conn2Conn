learned: true

default:
  data:
    source: SC
    target: FC
  model:
    name: Chen2024GCN
    layer_num: 2
    conv_dim: 256
    dnn_dim: 64
    node_feature_type: identity
    reg: 1.0e-4
    add_self_loops: true
    device: null
  trainer:
    lr: 1.0e-3
    loss_type: mse
    max_epochs: 400
    batch_size: 2
    log_every: 20

search_space:
  layer_num:
    type: choice
    values: [2, 3]
  conv_dim:
    type: choice
    values: [64, 128, 256]
  dnn_dim:
    type: choice
    values: [32, 64, 128]
  node_feature_type:
    type: choice
    values: [identity, sc_row]
  reg:
    type: loguniform
    lower: 1.0e-6
    upper: 1.0e-3
  lr:
    type: loguniform
    lower: 1.0e-4
    upper: 5.0e-3
  max_epochs:
    type: choice
    values: [200, 300, 400]
