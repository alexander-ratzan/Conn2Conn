learned: true

default:
  data:
    source: SC
    target: FC
  model:
    name: Chen2024GCN
    layer_num: 2
    conv_dim: 64
    dnn_dim: 32
    node_feature_type: identity
    reg: 1.0e-4
    add_self_loops: true
    device: null
  trainer:
    lr: 2.0e-3
    loss_type: mse
    max_epochs: 1000
    batch_size: 4
    log_every: 1

search_space:
  layer_num:
    type: choice
    values: [2, 3]
  conv_dim:
    type: choice
    values: [32, 64, 128]
  dnn_dim:
    type: choice
    values: [16, 32, 64]
  node_feature_type:
    type: choice
    values: [identity]
  reg:
    type: loguniform
    lower: 1.0e-5
    upper: 1.0e-3
  lr:
    type: loguniform
    lower: 5.0e-4
    upper: 5.0e-3
  max_epochs:
    type: choice
    values: [500, 750, 1000]