learned: true

default:
  data:
    source: SC
    target: FC
  model:
    name: LatentAttnMasked
    n_components_pca: 64
    n_components_pls: 16
    token_embedding_type: learned
    token_embedding_dim: 16
    pca_barcode_dim: 32
    attn_dim: 16
    value_dim: 16
    transformer_layers: 0
    num_heads: 1
    attention_activation: softmax
    residual_mode: pls_residual
    residual_gain_init: 1.0e-3
    readout_type: concat_mlp
    readout_hidden_dim: 16
    zscore_pca_scores: false
    attention_dropout: 0.0
    sc_token_dropout: 0.0
    reg: 1.0e-4
    mask_ratio: 0.5
    min_masked_components: 1
    train_use_visible_fc_context: true
    device: null
  trainer:
    lr: 1.0e-3
    loss_type: latent_mse
    loss_terms:
      - {name: mse, weight: 1.0}
      - {name: varmatch, weight: 1.0}
      - {name: correye, weight: 1.0}
      - {name: neidist, weight: 1.0}
    loss_normalize: ema
    loss_var_weight: 0.01
    loss_latent_weight: 0.25
    loss_scale_ema_decay: 0.95
    loss_scale_warmup_steps: 20
    max_epochs: 500
    batch_size: 128
    log_every: 1

search_space:
  n_components_pca:
    type: choice
    values: [32, 64, 96]
  n_components_pls:
    type: choice
    values: [8, 16, 24]
  token_embedding_type:
    type: choice
    values: [learned, pls_encoded, pca_encoded]
  token_embedding_dim:
    type: choice
    values: [8, 16, 24]
  pca_barcode_dim:
    type: choice
    values: [16, 32, 64]
  attn_dim:
    type: choice
    values: [8, 16, 32]
  value_dim:
    type: choice
    values: [8, 16, 32]
  transformer_layers:
    type: choice
    values: [0, 1, 2, 4]
  num_heads:
    type: choice
    values: [1, 2, 4]
  attention_activation:
    type: choice
    values: [softmax, identity]
  residual_mode:
    type: choice
    values: [attention_only, none, pls_residual, linear_residual]
  residual_gain_init:
    type: choice
    values: [0.0, 1.0e-4, 1.0e-3, 1.0e-2]
  readout_type:
    type: choice
    values: [linear, mlp, concat_mlp, scalar_slot]
  readout_hidden_dim:
    type: choice
    values: [8, 16, 32, 64]
  zscore_pca_scores:
    type: choice
    values: [false, true]
  attention_dropout:
    type: choice
    values: [0.0, 0.05, 0.1]
  sc_token_dropout:
    type: choice
    values: [0.0, 0.05, 0.1, 0.2]
  reg:
    type: loguniform
    lower: 1.0e-6
    upper: 1.0e-3
  mask_ratio:
    type: choice
    values: [0.25, 0.5, 0.75]
  train_use_visible_fc_context:
    type: choice
    values: [true, false]
  lr:
    type: loguniform
    lower: 3.0e-4
    upper: 3.0e-3
  loss_type:
    type: choice
    values: [mse, joint_mse_varmatch, composite, latent_mse, latent_weighted_mse, joint_edge_latent_mse, joint_edge_latent_mse_scaled]
  loss_var_weight:
    type: choice
    values: [0.001, 0.005, 0.01, 0.02, 0.05]
  loss_latent_weight:
    type: choice
    values: [0.05, 0.1, 0.25, 0.5, 1.0]
  loss_scale_ema_decay:
    type: choice
    values: [0.9, 0.95, 0.99]
  loss_scale_warmup_steps:
    type: choice
    values: [20, 25, 50, 100, 200]
  max_epochs:
    type: choice
    values: [300, 500, 750]
