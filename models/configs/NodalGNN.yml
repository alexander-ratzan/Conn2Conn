learned: true

default:
  data:
    source: SC
    target: FC
  model:
    name: NodalGNN
    layer_num: 2
    hidden_dim: 64
    decoder_dim: 32
    dropout: 0.2
    edge_dropout: 0.0
    reg: 1.0e-4
    use_volume: true
    use_spatial: true
    use_r2t: true
    add_self_loops: true
    device: null
  trainer:
    lr: 2.0e-3
    loss_type: mse
    max_epochs: 1000
    batch_size: 4
    log_every: 1

search_space:
  layer_num:
    type: choice
    values: [2, 3, 4]
  hidden_dim:
    type: choice
    values: [32, 64, 96, 128, 160]
  decoder_dim:
    type: choice
    values: [16, 32, 64, 96]
  dropout:
    type: choice
    values: [0.05, 0.1, 0.2, 0.35, 0.5, 0.65]
  edge_dropout:
    type: choice
    values: [0.0, 0.05, 0.1, 0.2, 0.3]
  reg:
    type: loguniform
    lower: 5.0e-6
    upper: 5.0e-3
  lr:
    type: loguniform
    lower: 2.0e-4
    upper: 7.0e-3
  max_epochs:
    type: choice
    values: [200, 400, 500, 750, 1000, 1500]
