learned: false

default:
  data:
    source: SC
    target: FC
  model:
    name: CrossModal_ConditionalGaussian
    fit_domain: pca                  # pca or raw_edges
    n_components_pca: 128            # retained PCA components (used directly in pca mode; also for preview/uncertainty summaries in raw_edges mode)
    lambda_ridge: 1.0e-3             # ridge/Tikhonov regularization strength
    covariance_estimator: empirical  # empirical, ledoit_wolf, oas (raw_edges currently supports empirical only)
    zscore_pca_scores: false         # componentwise z-scoring of PCA scores before fitting (pca mode)
    use_covariates: false            # if true, concatenate requested covariates directly into the conditioning variable
    cov_sources: []                  # any subset of [fs_all, fs_volumes, age, sex, race_eth]
    device: cpu
  trainer: {}

search_space:
  fit_domain:
    type: choice
    values: [pca, raw_edges]
  n_components_pca:
    type: choice
    values: [32, 64, 128, 256, 512]
  lambda_ridge:
    type: loguniform
    lower: 1.0e-5
    upper: 1.0e1
  covariance_estimator:
    type: choice
    values: [empirical, ledoit_wolf, oas]
  zscore_pca_scores:
    type: choice
    values: [false, true]
