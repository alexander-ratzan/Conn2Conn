learned: true

default:
  data:
    source: SC
    target: FC
  model:
    name: MaskedLatentPretrainer
    n_components_pca: 64
    token_embedding_dim: 16
    attn_dim: 16
    value_dim: 16
    transformer_layers: 0
    num_heads: 1
    readout_type: linear
    readout_hidden_dim: 16
    attention_activation: softmax
    zscore_pca_scores: true
    attention_dropout: 0.0
    reg: 1.0e-4
    sc_mask_ratio: 0.5
    fc_mask_ratio: 0.5
    min_masked_components_per_modality: 1
    use_covariates_cls: false
    cov_projector_hidden_dim: null
    loss_weighting: per_modality_mean
    device: null
  trainer:
    lr: 1.0e-3
    loss_type: latent_weighted_mse
    max_epochs: 500
    batch_size: 128
    log_every: 1

search_space:
  n_components_pca:
    type: choice
    values: [32, 64, 128]
  token_embedding_dim:
    type: choice
    values: [8, 16, 32]
  attn_dim:
    type: choice
    values: [8, 16, 32]
  value_dim:
    type: choice
    values: [8, 16, 32]
  transformer_layers:
    type: choice
    values: [0, 1, 2]
  num_heads:
    type: choice
    values: [1, 2, 4]
  readout_type:
    type: choice
    values: [linear, mlp]
  readout_hidden_dim:
    type: choice
    values: [8, 16, 32]
  attention_activation:
    type: choice
    values: [softmax, identity]
  zscore_pca_scores:
    type: choice
    values: [true]
  attention_dropout:
    type: choice
    values: [0.0, 0.05, 0.1]
  reg:
    type: loguniform
    lower: 1.0e-6
    upper: 1.0e-3
  sc_mask_ratio:
    type: choice
    values: [0.25, 0.5, 0.75]
  fc_mask_ratio:
    type: choice
    values: [0.25, 0.5, 0.75]
  lr:
    type: loguniform
    lower: 3.0e-4
    upper: 3.0e-3
  loss_type:
    type: choice
    values: [latent_mse, latent_weighted_mse]
  max_epochs:
    type: choice
    values: [200, 500]
