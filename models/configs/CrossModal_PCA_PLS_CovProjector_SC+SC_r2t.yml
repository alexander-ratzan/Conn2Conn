learned: true

default:
  data:
    source: SC+SC_r2t
    target: FC
  model:
    name: CrossModal_PCA_PLS_CovProjector
    n_components_pca_source:
      SC: 256
      SC_r2t: 256
    n_components_pca_target: 256
    n_components_pls: 16
    learn_encoder: false
    learn_mid: true
    learn_decoder: false
    random_init: false
    l1_l2_tuple: [0.0, 0.0001]
    dropout: 0.2
    cov_sources: [fs_all, fs_volumes, age, sex, race_eth]
    cov_projectors:
      fs_all:     {type: linear, out_dim: 64}
      fs_volumes: {type: linear, out_dim: 32}
      age:        {type: linear, out_dim: 4}
      sex:        {type: linear, out_dim: 4}
      race_eth:   {type: linear, out_dim: 8}
    cov_fusion:
      type: mlp
      hidden_dims: [64]
      dropout: 0.0
    device: null
  trainer:
    lr: 1.0e-4
    loss_type: demeaned_mse
    loss_alpha: 0.5
    loss_beta: 1.0
    max_epochs: 200
    batch_size: 64
    log_every: 5

search_space:
  n_components_pca_source:
    type: choice
    values:
      - {SC: 64, SC_r2t: 64}
      - {SC: 128, SC_r2t: 128}
      - {SC: 256, SC_r2t: 256}
      - {SC: 512, SC_r2t: 512}
  n_components_pca_target:
    type: choice
    values: [64, 128, 256, 512]
  n_components_pls:
    type: choice
    values: [4, 8, 16, 32, 64]
  cov_fusion:
    type: choice
    values:
      - {type: linear}
      - {type: mlp, hidden_dims: [64], dropout: 0.0}
      - {type: mlp, hidden_dims: [128], dropout: 0.1}
  dropout:
    type: uniform
    lower: 0.0
    upper: 0.4
  l1_l2_tuple:
    type: quniform
    lower: [0.0, 0.0]
    upper: [0.001, 0.001]
    q: [0.0001, 0.0001]
  lr:
    type: loguniform
    lower: 1.0e-5
    upper: 1.0e-2
  loss_type:
    type: choice
    values: [mse, demeaned_mse]
  max_epochs:
    type: choice
    values: [50, 100, 150, 200, 250]
