<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 28px sans-serif; fill: #111827; }
      .group { font: 700 18px sans-serif; fill: #1f2937; }
      .label { font: 600 16px sans-serif; fill: #111827; }
      .small { font: 14px sans-serif; fill: #374151; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 14; ry: 14; }
      .groupbox { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; rx: 18; ry: 18; }
      .latent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 14; ry: 14; }
      .resid { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 14; ry: 14; }
      .decode { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 14; ry: 14; }
      .arrow { stroke: #1f2937; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 8 6; }
    </style>
  </defs>

  <text x="60" y="50" class="title">Conn2Conn FreeSurfer Residual Projector Model</text>

  <rect x="40" y="90" width="300" height="280" class="groupbox"/>
  <text x="60" y="120" class="group">Source connectome inputs</text>

  <rect x="70" y="150" width="110" height="70" class="box"/>
  <text x="103" y="192" class="label">SC</text>
  <text x="85" y="244" class="small">vectorized edges</text>

  <rect x="70" y="270" width="110" height="70" class="box"/>
  <text x="87" y="312" class="label">SC_r2t</text>
  <text x="70" y="364" class="small">optional tract-correlations</text>

  <rect x="390" y="90" width="300" height="280" class="groupbox"/>
  <text x="410" y="120" class="group">Per-modality source encoders</text>

  <rect x="425" y="150" width="220" height="70" class="box"/>
  <text x="477" y="182" class="label">Center by train mean</text>
  <text x="482" y="206" class="small">then PCA_SC projection</text>

  <rect x="425" y="270" width="220" height="70" class="box"/>
  <text x="477" y="302" class="label">Center by train mean</text>
  <text x="470" y="326" class="small">then PCA_SC_r2t projection</text>

  <rect x="740" y="90" width="300" height="280" class="groupbox"/>
  <text x="760" y="120" class="group">Cross-modal latent backbone</text>

  <rect x="785" y="155" width="210" height="70" class="latent"/>
  <text x="826" y="187" class="label">Concatenate source</text>
  <text x="844" y="211" class="small">latents: z_src</text>

  <rect x="785" y="270" width="210" height="70" class="latent"/>
  <text x="841" y="302" class="label">PLS / learned</text>
  <text x="815" y="326" class="small">latent mapper: z_base</text>

  <rect x="40" y="430" width="490" height="210" class="groupbox"/>
  <text x="60" y="460" class="group">FreeSurfer residual branch</text>

  <rect x="75" y="500" width="120" height="70" class="box"/>
  <text x="97" y="542" class="label">FS data</text>
  <text x="79" y="594" class="small">subject covariates</text>

  <rect x="240" y="500" width="170" height="70" class="resid"/>
  <text x="265" y="532" class="label">Train-split z-score</text>
  <text x="273" y="556" class="small">normalize FS features</text>

  <rect x="435" y="500" width="60" height="70" class="resid"/>
  <text x="454" y="542" class="label">h</text>
  <text x="443" y="594" class="small">linear/MLP</text>

  <rect x="1090" y="120" width="250" height="210" class="groupbox"/>
  <text x="1110" y="150" class="group">Target PCA space</text>

  <rect x="1130" y="185" width="170" height="70" class="latent"/>
  <text x="1168" y="217" class="label">Residual add</text>
  <text x="1147" y="241" class="small">z_target = z_base + α z_fs</text>

  <rect x="1090" y="430" width="250" height="210" class="groupbox"/>
  <text x="1110" y="460" class="group">Target decoder</text>

  <rect x="1130" y="495" width="170" height="70" class="decode"/>
  <text x="1161" y="527" class="label">Fixed FC PCA</text>
  <text x="1146" y="551" class="small">decoder + target mean</text>

  <rect x="1130" y="610" width="170" height="70" class="decode"/>
  <text x="1160" y="652" class="label">Predicted FC</text>

  <line x1="180" y1="185" x2="425" y2="185" class="arrow"/>
  <line x1="180" y1="305" x2="425" y2="305" class="arrow"/>

  <line x1="645" y1="185" x2="785" y2="185" class="arrow"/>
  <line x1="645" y1="305" x2="785" y2="190" class="arrow"/>
  <line x1="890" y1="225" x2="890" y2="270" class="arrow"/>

  <line x1="195" y1="535" x2="240" y2="535" class="arrow"/>
  <line x1="410" y1="535" x2="435" y2="535" class="arrow"/>
  <line x1="495" y1="535" x2="1130" y2="220" class="arrow dashed"/>

  <line x1="995" y1="305" x2="1130" y2="220" class="arrow"/>
  <line x1="1215" y1="255" x2="1215" y2="495" class="arrow"/>
  <line x1="1215" y1="565" x2="1215" y2="610" class="arrow"/>

  <text x="1020" y="280" class="small">SC-driven FC latent</text>
  <text x="770" y="560" class="small">FS branch learns subject-specific residual</text>
  <text x="770" y="585" class="small">directly in target PCA space</text>

  <text x="60" y="710" class="small">Core equations:</text>
  <text x="60" y="735" class="small">z_src = concat_m((x_m - μ_m) W_m),   z_base = g(z_src),   z_fs = h(fs),   z_target = z_base + α z_fs,   ŷ_FC = z_target W_dec + μ_FC</text>
</svg>
