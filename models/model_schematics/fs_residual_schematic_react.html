<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cross-Modal PCA–PLS + FS Residual (React)</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=STIX+Two+Text:wght@400;600;700&family=Source+Sans+3:wght@400;600&display=swap');

    :root {
      --ink: #111827;
      --muted: #4b5563;
      --blue: #2563eb;
      --red: #ef4444;
      --gray: #6b7280;
      --green: #16a34a;
      --purple: #7c3aed;
      --paper: #ffffff;
      --bg: #f7f7fb;
      --line: #111827;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Source Sans 3", "Helvetica Neue", Arial, sans-serif;
    }

    #root {
      padding: 26px;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px 28px 30px;
      background: var(--paper);
      border: 1px solid #e5e7eb;
      border-radius: 16px;
    }

    h1 {
      font-family: "STIX Two Text", "Times New Roman", serif;
      font-size: 24px;
      margin: 0 0 6px;
      letter-spacing: 0.2px;
    }

    .subtitle {
      font-size: 13.5px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .legend {
      display: grid;
      grid-template-columns: repeat(4, max-content);
      gap: 10px 24px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .legend span { display: inline-flex; align-items: center; gap: 8px; }
    .swatch { width: 18px; height: 10px; border-radius: 3px; border: 2px solid var(--line); background: #fff; }
    .swatch.fixed { border-color: var(--gray); border-style: dashed; }
    .swatch.learn { border-color: var(--blue); }
    .swatch.res { border-color: var(--green); }
    .swatch.data { border-color: var(--line); }

    .caption {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    svg { width: 100%; height: auto; display: block; }

    .label { font-weight: 600; font-size: 13px; fill: var(--ink); }
    .small { font-size: 11.5px; fill: var(--muted); }
    .tiny { font-size: 10.5px; fill: var(--muted); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useMemo } = React;

    const ArrowDefs = () => (
      <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
          <path d="M0,0 L10,3 L0,6 Z" fill="#111827" />
        </marker>
      </defs>
    );

    const Arrow = ({ x1, y1, x2, y2, color = "#111827", dashed = false }) => (
      <line
        x1={x1}
        y1={y1}
        x2={x2}
        y2={y2}
        stroke={color}
        strokeWidth="2"
        strokeDasharray={dashed ? "7 5" : "none"}
        markerEnd="url(#arrow)"
      />
    );

    const Box = ({ x, y, w, h, className = "", fill = "#fff", stroke = "#111827", dash = false, rx = 8, ry = 8 }) => (
      <rect x={x} y={y} width={w} height={h} rx={rx} ry={ry}
        fill={fill} stroke={stroke} strokeWidth="1.6" strokeDasharray={dash ? "6 4" : "none"}
        className={className}
      />
    );

    const Trapezoid = ({ points, fill, stroke }) => (
      <polygon points={points} fill={fill} stroke={stroke} strokeWidth="1.6" />
    );

    const Wedge = ({ points, fill, stroke }) => (
      <polygon points={points} fill={fill} stroke={stroke} strokeWidth="1.6" />
    );

    const Text = ({ x, y, className, children }) => (
      <text x={x} y={y} className={className}>{children}</text>
    );

    const Diagram = () => (
      <svg viewBox="0 0 1500 720" role="img" aria-label="Cross-modal PCA-PLS with FS residual schematic">
        <ArrowDefs />

        {/* Title tag */}
        <rect x="1050" y="20" width="410" height="28" rx="8" ry="8" fill="#ede9fe" stroke="#7c3aed" strokeWidth="1.2" />
        <Text x="1062" y="39" className="small">Multi-source SC(+SC_r2t) → FC prediction with FS residual</Text>

        {/* Inputs */}
        <Text x="40" y="40" className="label">Measured connectomes (source)</Text>

        {/* Stacked plates */}
        <Box x={40} y={70} w={70} h={70} fill="#f3f4f6" />
        <Box x={50} y={80} w={70} h={70} fill="#e5e7eb" />
        <Box x={60} y={90} w={70} h={70} fill="#d1d5db" />
        <Text x={58} y={175} className="tiny">SC</Text>

        <Box x={40} y={200} w={70} h={70} fill="#f3f4f6" />
        <Box x={50} y={210} w={70} h={70} fill="#e5e7eb" />
        <Box x={60} y={220} w={70} h={70} fill="#d1d5db" />
        <Text x={48} y={305} className="tiny">SC_r2t (opt.)</Text>

        {/* Vectorized inputs */}
        <Box x={160} y={70} w={110} h={120} />
        <Text x={180} y={125} className="label">x_SC</Text>
        <Text x={170} y={148} className="tiny">edges × subjects</Text>
        <Text x={170} y={168} className="tiny">d = R(R-1)/2</Text>

        <Box x={160} y={210} w={110} h={120} />
        <Text x={170} y={265} className="label">x_r2t</Text>
        <Text x={170} y={288} className="tiny">edges × subjects</Text>

        <Arrow x1={120} y1={115} x2={160} y2={115} />
        <Arrow x1={120} y1={245} x2={160} y2={245} />
        <Text x={106} y={115} className="tiny">vec</Text>
        <Text x={106} y={245} className="tiny">vec</Text>

        {/* PCA trapezoids */}
        <Trapezoid points="300,80 360,60 360,200 300,180" fill="#eef2ff" stroke="#4338ca" />
        <Text x={312} y={135} className="label">PCA_SC</Text>
        <Text x={314} y={158} className="tiny">fixed</Text>

        <Trapezoid points="300,220 360,200 360,340 300,320" fill="#eef2ff" stroke="#4338ca" />
        <Text x={308} y={275} className="label">PCA_r2t</Text>
        <Text x={314} y={298} className="tiny">fixed</Text>

        <Arrow x1={270} y1={125} x2={300} y2={125} />
        <Arrow x1={270} y1={265} x2={300} y2={265} />

        {/* PCA scores */}
        <Box x={385} y={85} w={120} h={110} stroke="#6b7280" dash />
        <Text x={405} y={135} className="label">C_SC</Text>
        <Text x={400} y={158} className="tiny">k_SC comps</Text>

        <Box x={385} y={225} w={120} h={110} stroke="#6b7280" dash />
        <Text x={400} y={275} className="label">C_r2t</Text>
        <Text x={395} y={298} className="tiny">k_r2t comps</Text>

        <Arrow x1={360} y1={125} x2={385} y2={125} />
        <Arrow x1={360} y1={265} x2={385} y2={265} />

        {/* Concat block */}
        <Box x={545} y={140} w={140} h={120} />
        <Text x={565} y={190} className="label">Concat</Text>
        <Text x={555} y={213} className="tiny">z_src ∈ R^{k_SC+k_r2t}</Text>

        <Arrow x1={505} y1={140} x2={545} y2={190} />
        <Arrow x1={505} y1={280} x2={545} y2={205} />

        {/* PLS wedge */}
        <Wedge points="705,150 810,190 705,230" fill="#dbeafe" stroke="#2563eb" />
        <Text x={728} y={195} className="label">PLS / W_mid</Text>
        <Text x={732} y={215} className="tiny">learnable</Text>
        <Arrow x1={685} y1={200} x2={705} y2={200} color="#2563eb" />

        {/* Latent space */}
        <Box x={840} y={170} w={140} h={60} fill="#f3f4f6" stroke="#9ca3af" rx={12} ry={12} />
        <Text x={865} y={200} className="label">z_base</Text>
        <Text x={858} y={220} className="tiny">k_FC dims</Text>
        <Arrow x1={810} y1={200} x2={840} y2={200} color="#2563eb" />

        {/* Residual add */}
        <Box x={1010} y={165} w={170} h={70} stroke="#16a34a" />
        <Text x={1025} y={198} className="label">z_t = z_base + α z_fs</Text>
        <Text x={1030} y={220} className="tiny">α learnable</Text>
        <Arrow x1={980} y1={200} x2={1010} y2={200} />

        {/* Decoder and PCA inverse */}
        <Wedge points="1210,150 1320,190 1210,230" fill="#fee2e2" stroke="#ef4444" />
        <Text x={1230} y={195} className="label">Decoder</Text>
        <Text x={1220} y={215} className="tiny">W_dec (fixed/learnable)</Text>

        <Trapezoid points="1340,160 1400,140 1400,260 1340,240" fill="#eef2ff" stroke="#4338ca" />
        <Text x={1348} y={205} className="label">PCA_FC^{-1}</Text>
        <Text x={1348} y={225} className="tiny">fixed</Text>

        <Box x={1420} y={150} w={70} h={120} />
        <Text x={1430} y={205} className="label">ŷ_FC</Text>
        <Text x={1422} y={228} className="tiny">edges × subjects</Text>

        <Arrow x1={1180} y1={200} x2={1210} y2={200} color="#ef4444" />
        <Arrow x1={1320} y1={200} x2={1340} y2={200} color="#ef4444" />
        <Arrow x1={1400} y1={200} x2={1420} y2={200} />

        {/* Ground truth + loss */}
        <Box x={1420} y={300} w={70} h={110} />
        <Text x={1430} y={350} className="label">y_FC</Text>
        <Text x={1422} y={372} className="tiny">ground truth</Text>
        <Arrow x1={1455} y1={270} x2={1455} y2={300} />

        <rect x="1210" y="320" width="250" height="70" rx="8" ry="8" fill="#fef2f2" stroke="#ef4444" strokeWidth="1.4" />
        <Text x={1230} y={348} className="label">Loss</Text>
        <Text x={1230} y={368} className="tiny">MSE(ŷ_FC, y_FC) + optional terms</Text>

        <Arrow x1={1420} y1={355} x2={1460} y2={355} />
        <Arrow x1={1420} y1={200} x2={1460} y2={355} dashed />

        {/* Residual branch */}
        <Text x={40} y={420} className="label">FreeSurfer residual branch</Text>
        <Box x={40} y={450} w={120} h={70} />
        <Text x={58} y={482} className="label">FS data</Text>
        <Text x={50} y={504} className="tiny">f ∈ R^{d_fs}</Text>

        <Box x={190} y={450} w={160} h={70} stroke="#6b7280" dash />
        <Text x={205} y={480} className="label">Z-score</Text>
        <Text x={205} y={500} className="tiny">(μ_fs, σ_fs)</Text>

        <Wedge points="380,455 480,485 380,515" fill="#dbeafe" stroke="#2563eb" />
        <Text x={392} y={488} className="label">h(·)</Text>
        <Text x={392} y={508} className="tiny">linear / MLP</Text>

        <Box x={520} y={450} w={120} h={70} stroke="#16a34a" />
        <Text x={545} y={482} className="label">z_fs</Text>
        <Text x={538} y={504} className="tiny">k_FC dims</Text>

        <Arrow x1={160} y1={485} x2={190} y2={485} color="#16a34a" />
        <Arrow x1={350} y1={485} x2={380} y2={485} color="#16a34a" />
        <Arrow x1={480} y1={485} x2={520} y2={485} color="#16a34a" />
        <Arrow x1={640} y1={485} x2={1010} y2={200} color="#16a34a" dashed />

        {/* Footnotes */}
        <Text x={60} y={640} className="tiny">E_SC = R(R-1)/2, E_r2t for tract correlations. k_* are PCA ranks, k_FC is target latent dim.</Text>
        <Text x={60} y={660} className="tiny">Fixed: PCA means/loadings, FS z-score stats. Learnable: W_mid, W_dec (optional), h(·), α.</Text>
      </svg>
    );

    const App = () => (
      <div className="page">
        <h1>Cross-Modal PCA–PLS with FreeSurfer Residual Projector</h1>
        <div className="subtitle">NeurIPS-style layout mirroring Krakencoder: PCA trapezoids, encoder/decoder wedges, latent space, and explicit loss.</div>

        <div className="legend">
          <span><span className="swatch data" />data / observed</span>
          <span><span className="swatch fixed" />fixed (train PCA, z-score)</span>
          <span><span className="swatch learn" />learnable (PLS / linear / MLP)</span>
          <span><span className="swatch res" />residual branch</span>
        </div>

        <Diagram />

        <div className="caption">
          Layout mirrors the Krakencoder figure: left-to-right data flow, PCA compression, latent mapping, reconstruction,
          and loss blocks. The FreeSurfer residual branch injects subject covariates directly in target PCA space.
        </div>
      </div>
    );

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
